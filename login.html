<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack Madagascar AI - Connexion</title>
    <style>
        /* --- Importation des variables globales (Mauve & Sombre pour le fond) --- */
        :root {
            --bg-dark: #0f0c1b;         /* Fond très sombre tendance */
            --primary-gradient: linear-gradient(135deg, #ff007f, #6c5ce7); /* Rose à Mauve */
            --text-light: #ffffff;
            --text-muted: #a29bfe;
            --input-bg: rgba(255, 255, 255, 0.07);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            /* Création des orbes lumineuses floues en arrière-plan comme sur la photo */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 127, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(0, 206, 201, 0.12) 0%, transparent 35%),
                radial-gradient(circle at 85% 75%, rgba(108, 92, 231, 0.15) 0%, transparent 40%);
                    background-image: linear-gradient(rgba(15, 12, 27, 0.78), rgba(15, 12, 27, 0.88)), 
                      url('diplome.png') !important;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        /* --- Boîte de connexion style "Glassmorphism" (Effet Verre) --- */
        .glass-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            color: var(--text-light);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 0.3rem;
            background: linear-gradient(to right, #ffffff, #d6d1f8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* --- Formulaires stylisés --- */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.6);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.9rem 1rem;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--text-light);
            outline: none;
            transition: all 0.3s ease;
        }

        /* Style des options du select pour éviter l'effet blanc opaque moche */
        .form-group select option {
            background-color: #1c1830;
            color: white;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #ff007f;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* --- Lien Mot de passe oublié --- */
        .forgot-password {
            text-align: right;
            margin-top: -0.5rem;
            margin-bottom: 1.5rem;
        }

        .forgot-password a {
            color: #ff007f;
            font-size: 0.8rem;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.3s;
        }

        .forgot-password a:hover {
            opacity: 0.8;
        }

        /* --- Bouton Gradient Vibrant --- */
        .btn-gradient {
            width: 100%;
            padding: 1rem;
            background: var(--primary-gradient);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 0, 127, 0.25);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(255, 0, 127, 0.4);
        }

        .btn-gradient:active {
            transform: translateY(0);
        }

        /* --- Messages d'erreur intégrés au design --- */
        .error-message {
            background: rgba(255, 118, 117, 0.15);
            border: 1px solid rgba(255, 118, 117, 0.3);
            color: #ff7675;
            padding: 0.8rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        /* --- Bloc Info Démo --- */
        .demo-box {
            margin-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 1rem;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
        }
        .demo-box code {
            color: var(--text-muted);
            background: rgba(255,255,255,0.05);
            padding: 0.1rem 0.3rem;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="login-header">
            <h1>Welcome to EduTrack</h1>
            <p>Sign in to your account</p>
        </div>

        <div id="error-box" class="error-message">
            Identifiants incorrects.
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Email Address</label>
                <input type="text" id="username" required placeholder="hello@design.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <div class="form-group">
                <label for="role">Rôle d'accès</label>
                <select id="role">
                    <option value="enseignant">Enseignant / Administrateur</option>
                    <option value="parent">Parent d'élève</option>
                </select>
            </div>

            <div class="forgot-password">
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-gradient">Sign In</button>
        </form>

        <div class="demo-box">
            Comptes de test : prof@mg.com ou parent@mg.com (Code : 1234)
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const errorBox = document.getElementById('error-box');

            errorBox.style.display = "none";

            if (password === "1234") {
                if (username === "prof@mg.com" && role === "enseignant") {
                    window.location.href = "index.html"; // Lien vers le dashboard enseignant 
                } 
                else if (username === "parent@mg.com" && role === "parent") {
                    window.location.href = "parent.html"; // Lien vers l'espace parent 
                } 
                else {
                    errorBox.innerText = "Cet identifiant ne correspond pas au rôle sélectionné.";
                    errorBox.style.display = "block";
                }
            } else {
                errorBox.innerText = "Mot de passe incorrect (Utilisez '1234').";
                errorBox.style.display = "block";
            }
        });
    </script>
</body>
</html>
