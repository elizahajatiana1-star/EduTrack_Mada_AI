<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EduTrack Madagascar AI - Connexion</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>


    <div class="container">


        <!-- Partie gauche : présentation -->
        <div class="welcome-section">

            <div class="logo">
                🎓 EduTrack
            </div>


            <h1>
                EduTrack Madagascar AI
            </h1>


            <p>
                La plateforme intelligente de suivi scolaire
                permettant aux enseignants et parents de suivre
                la progression des élèves.
            </p>


            <div class="illustration">
                📚✨
            </div>


        </div>



        <!-- Partie droite : Login -->
        <div class="login-section">


            <div class="login-box">


                <h2>
                    Bienvenue 👋
                </h2>


                <p class="subtitle">
                    Connectez-vous à votre espace
                </p>



                <form id="loginForm">


                    <label>
                        Adresse email
                    </label>

                    <input 
                        type="email"
                        placeholder="exemple@gmail.com"
                        required
                    >




                    <label>
                        Mot de passe
                    </label>


                    <div class="password-box">

                        <input 
                            type="password"
                            id="password"
                            placeholder="Votre mot de passe"
                            required
                        >


                        <span id="showPassword">
                            👁
                        </span>

                    </div>




                    <label>
                        Type de compte
                    </label>


                    <select>

                        <option>
                            Enseignant
                        </option>


                        <option>
                            Parent
                        </option>


                        <option>
                            Administrateur
                        </option>


                    </select>




                    <button type="submit">

                        Se connecter

                    </button>


                </form>



                <p class="forgot">

                    Mot de passe oublié ?

                </p>



            </div>


        </div>



    </div>



<script src="script.js"></script>


</body>

</html>
