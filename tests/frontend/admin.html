<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack Madagascar AI - Administration</title>
    <style>
        :root {
            --bg-dark: #0f0c1b;
            --primary-gradient: linear-gradient(135deg, #ff007f, #6c5ce7);
            --text-light: #ffffff;
            --text-muted: #a29bfe;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(255, 255, 255, 0.07);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); min-height: 100vh; }
        header { background: rgba(15, 12, 27, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid var(--card-border); position: sticky; top: 0; z-index: 100; }
        .navbar { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 20px; }
        .logo { font-size: 24px; font-weight: 800; }
        .logo span { background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav a { color: var(--text-muted); text-decoration: none; font-weight: 600; }
        nav a.active { color: var(--text-light); }
        
        main { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        h2 { margin-bottom: 30px; font-size: 28px; }
        
        .container-admin { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px; }
        .card-admin { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 25px; }
        .card-admin h3 { margin-bottom: 20px; font-size: 20px; display: flex; align-items: center; gap: 10px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--card-border); border-radius: 6px; color: white; font-size: 15px; outline: none; }
        .form-group select option { background: #0f0c1b; color: white; }
        
        .btn-submit { width: 100%; padding: 14px; background: var(--primary-gradient); border: none; border-radius: 6px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: opacity 0.2s; }
        .btn-submit:hover { opacity: 0.9; }
        
        .liste-section { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 25px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--card-border); }
        th { color: var(--text-muted); font-size: 14px; }
        .btn-supprimer { background: #ff4757; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo">EduTrack <span>Madagascar AI</span></div>
            <nav>
                <ul>
                    <li><a href="index.html">Enseignants</a></li>
                    <li><a href="parent.html">Parents</a></li>
                    <li><a href="admin.html" class="active">Admin</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <h2>Espace Administration GBD</h2>
        
        <div class="container-admin">
            <div class="card-admin">
                <h3>👤 Ajouter un Élève</h3>
                <form id="form-ajouter-eleve">
                    <div class="form-group">
                        <label>Nom de l'élève</label>
                        <input type="text" id="eleve-nom" placeholder="Ex: RAKOTO" required>
                    </div>
                    <div class="form-group">
                        <label>Prénom de l'élève</label>
                        <input type="text" id="eleve-prenom" placeholder="Ex: Eliza" required>
                    </div>
                    <button type="submit" class="btn-submit">Enregistrer l'élève</button>
                </form>
            </div>

            <div class="card-admin">
                <h3>📝 Attribuer une Note</h3>
                <form id="form-attribuer-note">
                    <div class="form-group">
                        <label>Sélectionner l'Élève</label>
                        <select id="select-eleve-note" required>
                            <option value="">Chargement des élèves...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Matière</label>
                        <select id="note-matiere" required>
                            <option value="1">Mathématiques</option>
                            <option value="2">Français</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Note (sur 20)</label>
                        <input type="number" id="note-valeur" min="0" max="20" step="0.25" placeholder="Ex: 14.5" required>
                    </div>
                    <button type="submit" class="btn-submit">Enregistrer la note</button>
                </form>
            </div>
        </div>

        <div class="liste-section">
            <h3>📋 Liste des Élèves</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nom Complet</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="table-eleves-body">
                    <tr><td colspan="3" style="text-align: center; color: var(--text-muted);">Aucun élève trouvé.</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const API_URL = "http://127.0.0.1:8000/api";

        // 1. Charger et rafraîchir la liste des élèves partout dans l'interface
        async function rafraichirDonnees() {
            try {
                const res = await fetch(`${API_URL}/eleves`);
                const eleves = await res.json();

                // Remplir le tableau de visualisation
                const tbody = document.getElementById('table-eleves-body');
                if(eleves.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: var(--text-muted);">Aucun élève dans la base.</td></tr>`;
                } else {
                    tbody.innerHTML = eleves.map(e => `
                        <tr>
                            <td>${e.id}</td>
                            <td><strong>${e.prenom} ${e.nom}</strong></td>
                            <td><button class="btn-supprimer" onclick="supprimerEleve(${e.id})">Supprimer</button></td>
                        </tr>
                    `).join('');
                }

                // Remplir la liste déroulante du formulaire des notes
                const selectNote = document.getElementById('select-eleve-note');
                if(eleves.length === 0) {
                    selectNote.innerHTML = `<option value="">Aucun élève disponible</option>`;
                } else {
                    selectNote.innerHTML = eleves.map(e => `
                        <option value="${e.id}">${e.prenom} ${e.nom}</option>
                    `).join('');
                }

            } catch (err) {
                console.error("Erreur de connexion à l'API:", err);
            }
        }

        // 2. Action d'enregistrement d'un nouvel élève
        document.getElementById('form-ajouter-eleve').addEventListener('submit', async function(e) {
            e.preventDefault();
            const nom = document.getElementById('eleve-nom').value.trim();
            const prenom = document.getElementById('eleve-prenom').value.trim();

            try {
                const res = await fetch(`${API_URL}/eleves`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nom: nom,
                        prenom: prenom,
                        classe_id: 1, // Attribué par défaut à la classe 1
                        date_naissance: null,
                        contact_parent: null
                    })
                });

                if(res.ok) {
                    this.reset();
                    await rafraichirDonnees();
                    alert("Élève ajouté avec succès !");
                }
            } catch(err) {
                alert("Erreur lors de l'enregistrement de l'élève.");
            }
        });

        // 3. Action d'enregistrement d'une note
        document.getElementById('form-attribuer-note').addEventListener('submit', async function(e) {
            e.preventDefault();
            const eleveId = document.getElementById('select-eleve-note').value;
            const matiereId = document.getElementById('note-matiere').value;
            const valeur = document.getElementById('note-valeur').value;

            try {
                const res = await fetch(`${API_URL}/notes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        eleve_id: parseInt(eleveId),
                        matiere_id: parseInt(matiereId),
                        valeur: parseFloat(valeur),
                        date_evaluation: new Date().toISOString().split('T')[0], // Date du jour dynamique
                        trimestre: 3
                    })
                });

                if(res.ok) {
                    this.reset();
                    alert("Note enregistrée avec succès !");
                    await rafraichirDonnees();
                }
            } catch(err) {
                alert("Erreur lors de l'enregistrement de la note.");
            }
        });

        // 4. Action de suppression d'un élève
        async function supprimerEleve(id) {
            if(!confirm("Voulez-vous vraiment supprimer cet élève ainsi que ses notes ?")) return;
            try {
                const res = await fetch(`${API_URL}/eleves/${id}`, { method: 'DELETE' });
                if(res.ok) {
                    await rafraichirDonnees();
                }
            } catch(err) {
                console.error(err);
            }
        }

        // Charger les données au démarrage de la page
        document.addEventListener('DOMContentLoaded', rafraichirDonnees);
    </script>
</body>
</html>
